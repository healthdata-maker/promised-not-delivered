<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#6B7280" stroke-width="1" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0D0D0F" />
  
  <!-- Concentric Rings -->
  <circle cx="200" cy="150" r="40" fill="none" stroke="#6B7280" stroke-width="1.5" />
  <circle cx="200" cy="150" r="75" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 4" />
  <circle cx="200" cy="150" r="110" fill="none" stroke="#6B7280" stroke-width="0.5" />
  
  <!-- Central Focus with Hatching -->
  <rect x="185" y="135" width="30" height="30" fill="url(#hatch)" />
  <rect x="190" y="140" width="20" height="20" fill="#6B7280" />

  <!-- Community Participants (Participation) -->
  <!-- Inner Ring Engagement -->
  <rect x="235" y="145" width="10" height="10" fill="#6B7280" transform="rotate(45 240 150)" />
  <rect x="160" y="145" width="10" height="10" fill="#6B7280" transform="rotate(45 165 150)" />
  <rect x="195" y="105" width="10" height="10" fill="#6B7280" transform="rotate(45 200 110)" />
  <rect x="195" y="185" width="10" height="10" fill="#6B7280" transform="rotate(45 200 190)" />

  <!-- Outer Ring Engagement -->
  <rect x="270" y="100" width="8" height="8" fill="none" stroke="#6B7280" stroke-width="2" transform="rotate(15 274 104)" />
  <rect x="120" y="200" width="8" height="8" fill="none" stroke="#6B7280" stroke-width="2" transform="rotate(30 124 204)" />
  <rect x="300" y="180" width="8" height="8" fill="url(#hatch)" stroke="#6B7280" stroke-width="1" />
  <rect x="80" y="120" width="8" height="8" fill="url(#hatch)" stroke="#6B7280" stroke-width="1" />
  
  <!-- Metaphorical Connection Lines -->
  <line x1="200" y1="40" x2="200" y2="70" stroke="#6B7280" stroke-width="1" />
  <line x1="200" y1="230" x2="200" y2="260" stroke="#6B7280" stroke-width="1" />
  <line x1="90" y1="150" x2="120" y2="150" stroke="#6B7280" stroke-width="1" />
  <line x1="280" y1="150" x2="310" y2="150" stroke="#6B7280" stroke-width="1" />
  
  <!-- Shadow/Depth Hatching Ground -->
  <rect x="140" y="270" width="120" height="4" fill="url(#hatch)" />
</svg>