<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#0D0D0F"/>
  
  <!-- Main Illustration Group -->
  <g fill="#6B7280">
    <!-- Torch Handle -->
    <rect x="190" y="110" width="20" height="110"/>
    
    <!-- Torch Flame (Geometric) -->
    <path d="M200 30 L235 85 L200 110 L165 85 Z"/>
    
    <!-- Left Arm (Passing) -->
    <path d="M0 260 L190 190 L190 220 L20 290 Z"/>
    
    <!-- Right Arm (Receiving) -->
    <path d="M400 230 L210 160 L210 190 L380 260 Z"/>
    
    <!-- Hand Details (Geometric blocks) -->
    <rect x="180" y="195" width="30" height="8"/>
    <rect x="190" y="165" width="30" height="8"/>
    
    <!-- Crosshatch Shadowing (Carved out with background color) -->
    <g stroke="#0D0D0F" stroke-width="1.5">
      <!-- Shadow on Torch -->
      <line x1="202" y1="110" x2="210" y2="118"/>
      <line x1="202" y1="125" x2="210" y2="133"/>
      <line x1="202" y1="140" x2="210" y2="148"/>
      <line x1="202" y1="155" x2="210" y2="163"/>
      <line x1="202" y1="170" x2="210" y2="178"/>
      <line x1="202" y1="185" x2="210" y2="193"/>
      <line x1="202" y1="200" x2="210" y2="208"/>
      
      <!-- Shadow on Flame -->
      <line x1="200" y1="70" x2="215" y2="85"/>
      <line x1="200" y1="85" x2="210" y2="95"/>
      <line x1="200" y1="50" x2="225" y2="75"/>
      
      <!-- Shadow on Left Arm -->
      <line x1="50" y1="250" x2="70" y2="270"/>
      <line x1="80" y1="240" x2="100" y2="260"/>
      <line x1="110" y1="230" x2="130" y2="250"/>
      <line x1="140" y1="220" x2="160" y2="240"/>
      
      <!-- Shadow on Right Arm -->
      <line x1="250" y1="185" x2="270" y2="205"/>
      <line x1="280" y1="195" x2="300" y2="215"/>
      <line x1="310" y1="205" x2="330" y2="225"/>
      <line x1="340" y1="215" x2="360" y2="235"/>
    </g>
  </g>
</svg>