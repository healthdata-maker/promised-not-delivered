<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#0D0D0F"/>
  <defs>
    <pattern id="crosshatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#6B7280" stroke-width="0.8"/>
    </pattern>
    <clipPath id="circleClip">
      <circle cx="200" cy="150" r="120" />
    </clipPath>
  </defs>
  
  <!-- Radiating Rings -->
  <circle cx="200" cy="150" r="120" fill="none" stroke="#6B7280" stroke-width="1"/>
  <circle cx="200" cy="150" r="100" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <circle cx="200" cy="150" r="80" fill="none" stroke="#6B7280" stroke-width="2"/>
  <circle cx="200" cy="150" r="60" fill="none" stroke="#6B7280" stroke-width="2.5"/>
  <circle cx="200" cy="150" r="40" fill="none" stroke="#6B7280" stroke-width="3"/>
  
  <!-- Participation Slice (Metaphorical Insight) -->
  <path d="M 200,150 L 350,50 L 350,250 Z" fill="url(#crosshatch)" clip-path="url(#circleClip)"/>
  <path d="M 200,150 L 350,50" stroke="#6B7280" stroke-width="2" />
  <path d="M 200,150 L 350,250" stroke="#6B7280" stroke-width="2" />

  <!-- Shadow side for editorial depth -->
  <path d="M 200,30 A 120,120 0 0 0 200,270" fill="none" stroke="#6B7280" stroke-width="8" stroke-dasharray="2,4"/>
  
  <!-- Central Vignette Point -->
  <circle cx="200" cy="150" r="15" fill="#6B7280"/>
  <path d="M 200,135 L 215,150 L 200,165 L 185,150 Z" fill="#0D0D0F"/>
  
  <!-- Static horizontal lines to ground the concept -->
  <line x1="80" y1="150" x2="185" y2="150" stroke="#6B7280" stroke-width="1"/>
  <line x1="215" y1="150" x2="320" y2="150" stroke="#6B7280" stroke-width="1"/>
</svg>