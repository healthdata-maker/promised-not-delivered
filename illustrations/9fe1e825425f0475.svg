<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#0D0D0F" />
  
  <!-- Map Regions (Conceptual Topography) -->
  
  <!-- Region 1: Solid (Context Baseline) -->
  <path d="M150 60 L250 80 L230 130 L130 110 Z" fill="#6B7280" />
  
  <!-- Region 2: Vertical Stripes (Segmented Communication) -->
  <path d="M250 80 L320 140 L280 210 L230 130 Z" fill="none" stroke="#6B7280" stroke-width="2" />
  <line x1="260" y1="95" x2="260" y2="155" stroke="#6B7280" stroke-width="1.5" />
  <line x1="275" y1="110" x2="275" y2="175" stroke="#6B7280" stroke-width="1.5" />
  <line x1="290" y1="125" x2="290" y2="190" stroke="#6B7280" stroke-width="1.5" />
  <line x1="305" y1="140" x2="305" y2="195" stroke="#6B7280" stroke-width="1.5" />

  <!-- Region 3: Crosshatch (Collective Complexity) -->
  <path d="M230 130 L280 210 L180 260 L140 190 Z" fill="none" stroke="#6B7280" stroke-width="2" />
  <!-- Diagonal Hatch 1 -->
  <line x1="160" y1="200" x2="260" y2="230" stroke="#6B7280" stroke-width="1" />
  <line x1="170" y1="180" x2="275" y2="210" stroke="#6B7280" stroke-width="1" />
  <line x1="185" y1="160" x2="285" y2="190" stroke="#6B7280" stroke-width="1" />
  <!-- Diagonal Hatch 2 (Cross) -->
  <line x1="160" y1="230" x2="260" y2="200" stroke="#6B7280" stroke-width="1" />
  <line x1="175" y1="250" x2="275" y2="220" stroke="#6B7280" stroke-width="1" />
  <line x1="150" y1="210" x2="250" y2="180" stroke="#6B7280" stroke-width="1" />

  <!-- Region 4: Outline / Open (Individual Compliance Space) -->
  <path d="M130 110 L230 130 L140 190 L80 150 Z" fill="none" stroke="#6B7280" stroke-width="2" />
  
  <!-- Boundary Accents -->
  <path d="M130 110 L230 130 M230 130 L250 80 M230 130 L280 210 M230 130 L140 190" stroke="#0D0D0F" stroke-width="3" />
  
  <!-- Focal Point (The Anchor of Collective Action) -->
  <circle cx="230" cy="130" r="4" fill="#0D0D0F" stroke="#6B7280" stroke-width="2" />
</svg>