<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#6B7280" stroke-width="0.8" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0D0D0F" />
  
  <!-- Rural Landscape (Mountains) -->
  <polygon points="0,220 100,80 180,180 280,40 400,220 400,300 0,300" fill="none" stroke="#6B7280" stroke-width="1.5" />
  <polygon points="280,40 400,220 400,300 280,300" fill="url(#hatch)" opacity="0.4" />
  <polygon points="100,80 180,180 130,300 50,300" fill="url(#hatch)" opacity="0.4" />

  <!-- Concentric Radiating Circles (Mental Health/Participation) -->
  <circle cx="200" cy="240" r="30" fill="none" stroke="#6B7280" stroke-width="1" />
  <circle cx="200" cy="240" r="60" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="10 5" />
  <circle cx="200" cy="240" r="100" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="20 10" />
  <circle cx="200" cy="240" r="150" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="5 15" />
  <circle cx="200" cy="240" r="210" fill="none" stroke="#6B7280" stroke-width="0.5" />

  <!-- Central Point (Stylized Sports Element) -->
  <g transform="translate(200, 240)">
    <circle r="12" fill="#6B7280" />
    <!-- Geometric ball patterns -->
    <path d="M 0,-12 L 0,12 M -12,0 L 12,0 M -8.5,-8.5 L 8.5,8.5 M -8.5,8.5 L 8.5,-8.5" stroke="#0D0D0F" stroke-width="1.5" />
    <circle r="14" fill="none" stroke="#6B7280" stroke-width="1" />
  </g>

  <!-- Ground Line -->
  <line x1="0" y1="240" x2="400" y2="240" stroke="#6B7280" stroke-width="0.5" opacity="0.3" />
</svg>