<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#0D0D0F" />
  
  <!-- Left Arm (Passing) -->
  <path d="M 0 280 L 160 170 L 190 170 L 190 195 L 30 300 Z" fill="#6B7280" />
  
  <!-- Right Arm (Receiving) -->
  <path d="M 400 280 L 240 140 L 210 140 L 210 165 L 370 300 Z" fill="#6B7280" />
  
  <!-- Torch Body -->
  <path d="M 192 110 L 208 110 L 212 180 L 188 180 Z" fill="#6B7280" />
  
  <!-- Flame - Geometric/Abstract -->
  <path d="M 200 30 L 220 70 L 200 100 L 180 70 Z" fill="#6B7280" />
  <path d="M 185 60 L 175 85 L 190 90 Z" fill="#6B7280" />
  <path d="M 215 60 L 225 85 L 210 90 Z" fill="#6B7280" />

  <!-- Crosshatch Etching (Shadows on Arms) -->
  <g stroke="#0D0D0F" stroke-width="1.5">
    <!-- Left arm hatching -->
    <line x1="40" y1="285" x2="60" y2="265" />
    <line x1="60" y1="270" x2="80" y2="250" />
    <line x1="80" y1="255" x2="100" y2="235" />
    <line x1="100" y1="240" x2="120" y2="220" />
    <line x1="120" y1="225" x2="140" y2="205" />
    <line x1="140" y1="210" x2="160" y2="190" />
    
    <!-- Right arm hatching -->
    <line x1="360" y1="285" x2="340" y2="265" />
    <line x1="340" y1="270" x2="320" y2="250" />
    <line x1="320" y1="255" x2="300" y2="235" />
    <line x1="300" y1="240" x2="280" y2="220" />
    <line x1="280" y1="225" x2="260" y2="205" />
    <line x1="260" y1="210" x2="240" y2="190" />
    
    <!-- Torch hatching -->
    <line x1="190" y1="150" x2="210" y2="150" />
    <line x1="190" y1="160" x2="210" y2="160" />
    <line x1="190" y1="170" x2="210" y2="170" />
  </g>

  <!-- Accent Geometric Spark -->
  <rect x="198" y="115" width="4" height="40" fill="#0D0D0F" />
</svg>