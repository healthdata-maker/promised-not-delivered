<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#0D0D0F" />
  
  <!-- Left Giver Arm -->
  <path d="M0,280 L160,180 L180,205 L30,300 Z" fill="#6B7280" opacity="0.8" />
  
  <!-- Right Receiver Arm -->
  <path d="M400,280 L240,180 L220,205 L370,300 Z" fill="#6B7280" opacity="0.6" />
  
  <!-- Torch Handle -->
  <rect x="192" y="160" width="16" height="70" fill="#6B7280" />
  
  <!-- House Beacon (The Flame) -->
  <path d="M160,160 L240,160 L240,110 L200,70 L160,110 Z" fill="#6B7280" />
  
  <!-- Crosshatch Shadow on House (Left side) -->
  <line x1="160" y1="120" x2="180" y2="100" stroke="#0D0D0F" stroke-width="1.5" />
  <line x1="160" y1="140" x2="200" y2="100" stroke="#0D0D0F" stroke-width="1.5" />
  <line x1="160" y1="160" x2="220" y2="100" stroke="#0D0D0F" stroke-width="1.5" />
  <line x1="180" y1="160" x2="240" y2="100" stroke="#0D0D0F" stroke-width="1.5" />
  <line x1="200" y1="160" x2="240" y2="120" stroke="#0D0D0F" stroke-width="1.5" />
  <line x1="220" y1="160" x2="240" y2="140" stroke="#0D0D0F" stroke-width="1.5" />
  
  <!-- Solar Panel Geometry (Concept of sustainability) -->
  <line x1="200" y1="70" x2="200" y2="160" stroke="#0D0D0F" stroke-width="1" />
  <line x1="160" y1="110" x2="240" y2="110" stroke="#0D0D0F" stroke-width="1" />

  <!-- Radiating Community Rays -->
  <path d="M200,40 L205,55 L195,55 Z" fill="#6B7280" />
  <path d="M140,80 L155,90 L150,95 Z" fill="#6B7280" />
  <path d="M260,80 L245,90 L250,95 Z" fill="#6B7280" />
  
  <!-- Ground Shadow/Connection -->
  <rect x="150" y="270" width="100" height="2" fill="#6B7280" />
</svg>