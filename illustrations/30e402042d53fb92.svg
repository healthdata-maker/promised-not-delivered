<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#0D0D0F"/>
  
  <!-- Pathway Horizon -->
  <line x1="50" y1="240" x2="350" y2="240" stroke="#6B7280" stroke-width="1"/>
  
  <!-- Left Figure (Passing) -->
  <path d="M80 240 L120 240 L120 180 L180 160 L180 150 L110 170 Z" fill="#6B7280"/>
  
  <!-- Right Figure (Receiving) -->
  <path d="M320 240 L280 240 L280 180 L220 160 L220 150 L290 170 Z" fill="#6B7280"/>
  
  <!-- The Torch (The Link) -->
  <rect x="192" y="110" width="16" height="50" fill="#6B7280"/>
  <path d="M185 110 L215 110 L200 60 Z" fill="#6B7280"/>
  
  <!-- Crosshatch Shadow: Left Figure -->
  <line x1="85" y1="240" x2="95" y2="230" stroke="#0D0D0F" stroke-width="1"/>
  <line x1="95" y1="240" x2="105" y2="230" stroke="#0D0D0F" stroke-width="1"/>
  <line x1="105" y1="240" x2="115" y2="230" stroke="#0D0D0F" stroke-width="1"/>
  
  <!-- Crosshatch Shadow: Right Figure -->
  <line x1="285" y1="240" x2="295" y2="230" stroke="#0D0D0F" stroke-width="1"/>
  <line x1="295" y1="240" x2="305" y2="230" stroke="#0D0D0F" stroke-width="1"/>
  <line x1="305" y1="240" x2="315" y2="230" stroke="#0D0D0F" stroke-width="1"/>

  <!-- Crosshatch Shadow: Torch -->
  <line x1="192" y1="155" x2="208" y2="155" stroke="#0D0D0F" stroke-width="0.5"/>
  <line x1="192" y1="145" x2="208" y2="145" stroke="#0D0D0F" stroke-width="0.5"/>
  <line x1="192" y1="135" x2="208" y2="135" stroke="#0D0D0F" stroke-width="0.5"/>
  <line x1="192" y1="125" x2="208" y2="125" stroke="#0D0D0F" stroke-width="0.5"/>
  
  <!-- Abstract Light Rays -->
  <path d="M200 50 L180 20 L185 20 Z" fill="#6B7280"/>
  <path d="M200 50 L220 20 L215 20 Z" fill="#6B7280"/>
  <path d="M200 45 L200 10" stroke="#6B7280" stroke-width="2"/>
</svg>