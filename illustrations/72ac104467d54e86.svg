<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#6B7280" stroke-width="1" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0D0D0F" />
  
  <!-- Figure Left (Stylized Profile) -->
  <path d="M40 300 L120 180 L160 180 L140 120 L100 120 L80 140 Z" fill="#6B7280" />
  <path d="M120 180 L160 180 L140 120 Z" fill="url(#hatch)" />
  
  <!-- Figure Right (Stylized Profile) -->
  <path d="M360 300 L280 180 L240 180 L260 120 L300 120 L320 140 Z" fill="#6B7280" />
  <path d="M280 180 L240 180 L260 120 Z" fill="url(#hatch)" opacity="0.6" />

  <!-- The Torch Handle -->
  <rect x="192" y="140" width="16" height="80" fill="#6B7280" />
  <rect x="196" y="140" width="8" height="80" fill="url(#hatch)" />

  <!-- The Flame (Geometric/Crystalline) -->
  <path d="M200 40 L230 100 L200 130 L170 100 Z" fill="#6B7280" />
  <path d="M200 65 L215 100 L200 115 L185 100 Z" fill="#0D0D0F" />
  <path d="M200 40 L230 100 L200 100 Z" fill="url(#hatch)" />

  <!-- Connecting Hands (Abstract) -->
  <path d="M160 185 L192 185 L192 205 L155 205 Z" fill="#6B7280" />
  <path d="M240 175 L208 175 L208 195 L245 195 Z" fill="#6B7280" />
  
  <!-- Shadow/Ground Detail -->
  <path d="M0 300 L400 300 L380 280 L20 280 Z" fill="url(#hatch)" opacity="0.3" />
</svg>