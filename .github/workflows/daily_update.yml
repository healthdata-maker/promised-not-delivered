name: Daily document scan and deploy

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      day_zero:
        description: 'Full historical crawl from 1990? (true/false)'
        required: false
        default: 'false'

jobs:
  scan-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CORE_API_KEY: ${{ secrets.CORE_API_KEY }}
          IS_DAY_ZERO: ${{ github.event.inputs.day_zero || 'false' }}
        run: python automation/run_pipeline.py

      - name: Commit updates if anything changed
        run: |
          git config user.name "SBC Promise Tracker"
          git config user.email "bot@promised-not-delivered"
          git add data.json seen_urls.json review_queue.json charts/ illustrations/
          git diff --staged --quiet && echo "Nothing new today. Skipping commit." || (git commit -m "Daily scan: $(date +%Y-%m-%d)" && git push)

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=promised-not-delivered --branch=main
